<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do list</title>
  </head>
  <body>
    <div class="content">
      <div class="sideBar">
        <h2>Projects</h2>
        <div class="projectContainer">
          <button class="projectButton">Project</button>
        </div>
        <button id="addProjectButton">Add Project</button>
      </div>
      <div class="projectDisplay">
        <div class="project">
          <div class="projectHeader">
            <p class="name">name</p>
            <p class="projectDueDate">due date</p>
          </div>
          <div class="toDos">
            <div class="todo">
              <p class="title">title</p>
              <p class="toDoDueDate">due date</p>
              <p class="description">decription</p>
              <p class="notes">notes</p>
            </div>
            <div class="todo">
              <p class="title">title</p>
              <p class="toDoDueDate">due date</p>
              <p class="description">decription</p>
              <p class="notes">notes</p>
            </div>
            <div class="todo">
              <p class="title">title</p>
              <p class="toDoDueDate">due date</p>
              <p class="description">decription</p>
              <p class="notes">notes</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal inactive">
      <div class="projectFormContainer inactive">
        <button class="closeProjectFormButton">X</button>
        <h1>Create a new Project</h1>
        <form id="projectForm" action="">
          <ul class="formList">
            <li>
              <label for="title">Title of Project:</label>
              <input type="text" id="title" name="title" />
            </li>
            <li>
              <label for="dueDate">Project Due Date:</label>
              <input type="text" id="dueDate" name="dueDate" />
            </li>
          </ul>
        </form>
        <button class="projectFormAddToDoButton">Add To Do</button>
      </div>
    </div>
  </body>
  <script src="./bundle.js"></script>
</html>
